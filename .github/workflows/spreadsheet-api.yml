name: Spreadsheet API CI

on:
  push:
    branches: [main, master]
    paths:
      - 'apps/spreadsheet-api/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'apps/spreadsheet-api/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/spreadsheet-api
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/spreadsheet-api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Smoke test server startup
        run: |
          timeout 5 node -e "
            const app = require('./server');
            console.log('Server module loaded successfully');
            process.exit(0);
          " || true
