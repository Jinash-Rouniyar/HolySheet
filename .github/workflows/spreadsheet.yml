name: Spreadsheet CI

on:
  push:
    branches: [main, master]
    paths:
      - 'apps/spreadsheet/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'apps/spreadsheet/**'

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/spreadsheet
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/spreadsheet/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          CI: true
